name: Champion Requirement Check

on:
  pull_request_target:
    types: [opened, reopened]
    paths:
      - 'proposals/**'

permissions:
  pull-requests: write
  issues: write

jobs:
  check-champion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Get changed proposal files
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const proposalFiles = files.data
              .filter(f => f.filename.startsWith('proposals/') && f.filename.endsWith('.md'))
              .map(f => f.filename);
            core.setOutput('files', proposalFiles.join('\n'));

      - name: Check for Champion field
        id: champion-check
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$CHANGED_FILES" ]; then
            echo "has_champion=false" >> $GITHUB_OUTPUT
            echo "reason=no_proposal_file" >> $GITHUB_OUTPUT
            exit 0
          fi

          KNOWN_ORGS="intellecteu|canton foundation|digital asset|zenith|temple|t-rize|trize|cumberland|obsidian"

          CHAMPION_FOUND=false
          CHAMPION_EMPTY=false
          CHAMPION_VALUE=""

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue

            if ! grep -qiE '(champion|endorser|sponsor)' "$f"; then
              continue
            fi

            KEYWORD_LINE=$(grep -inE '(champion|endorser|sponsor)' "$f" | head -1 | cut -d: -f1)
            KEYWORD_TEXT=$(sed -n "${KEYWORD_LINE}p" "$f")

            SAME_LINE_VALUE=$(echo "$KEYWORD_TEXT" | \
              sed 's/^[[:space:]#*|]*//; s/\*//g' | \
              awk '{gsub(/[Cc]hampion|[Ee]ndorser|[Ss]ponsor/, ""); gsub(/^[[:space:]/:|\-]+/, ""); gsub(/[|]/, ""); gsub(/^[[:space:]]+|[[:space:]]+$/, ""); print}')

            if [ -n "$SAME_LINE_VALUE" ] && [ "$SAME_LINE_VALUE" != "" ]; then
              CANDIDATE="$SAME_LINE_VALUE"
            else
              TOTAL_LINES=$(wc -l < "$f")
              CANDIDATE=""
              for i in $(seq $((KEYWORD_LINE + 1)) $((KEYWORD_LINE + 5))); do
                [ "$i" -gt "$TOTAL_LINES" ] && break
                NEXT_LINE=$(sed -n "${i}p" "$f" | sed 's/[*#>]//g' | xargs 2>/dev/null || true)
                if [ -n "$NEXT_LINE" ]; then
                  CANDIDATE="$NEXT_LINE"
                  break
                fi
              done
            fi

            if [ -z "$CANDIDATE" ]; then
              CHAMPION_EMPTY=true
            elif echo "$CANDIDATE" | grep -qiE '(tbd|n/?a|to be |none|looking for|seeking|needed|required|pending|\[required|name.?.?title|insert |your .* here|placeholder|fill in)'; then
              CHAMPION_EMPTY=true
              CHAMPION_VALUE="$CANDIDATE"
            elif echo "$CANDIDATE" | grep -qiE "($KNOWN_ORGS)"; then
              CHAMPION_FOUND=true
              CHAMPION_VALUE="$CANDIDATE"
            else
              CHAMPION_EMPTY=true
              CHAMPION_VALUE="$CANDIDATE"
            fi
          done <<< "$CHANGED_FILES"

          if [ "$CHAMPION_FOUND" = true ]; then
            echo "has_champion=true" >> $GITHUB_OUTPUT
            SAFE_VALUE=$(echo "$CHAMPION_VALUE" | tr -d '\n"' | head -c 200)
            echo "champion_value=$SAFE_VALUE" >> $GITHUB_OUTPUT
          elif [ "$CHAMPION_EMPTY" = true ]; then
            echo "has_champion=false" >> $GITHUB_OUTPUT
            echo "reason=empty_field" >> $GITHUB_OUTPUT
          else
            echo "has_champion=false" >> $GITHUB_OUTPUT
            echo "reason=no_field" >> $GITHUB_OUTPUT
          fi

      - name: Comment and close if no champion
        if: steps.champion-check.outputs.has_champion == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const alreadyCommented = comments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Tech & Ops Committee champion')
            );
            if (alreadyCommented) return;

            const reason = '${{ steps.champion-check.outputs.reason }}';
            const CIP_LINK = '[CIP-0100](https://github.com/canton-foundation/cips/blob/main/cip-0100/cip-0100.md)';
            const FOOTER = `If you need help finding a champion, reach out to SIGs or any Tech & Ops Committee member.\n\nThis PR is being closed automatically. You are welcome to reopen it once a champion is confirmed.`;

            let message;
            if (reason === 'empty_field') {
              message = `@${context.payload.pull_request.user.login}, thank you for your interest in the Canton Development Fund!\n\nYour proposal needs a valid Tech & Ops Committee champion organization. The champion field is either empty, contains placeholder text, or names an organization that is not a current Tech & Ops Committee member.\n\nPer ${CIP_LINK}, all external proposals require a Tech & Ops Committee champion.\n\nNext steps:\n1. Identify a Tech & Ops Committee member organization willing to champion your proposal\n2. Update the Champion field with their name\n3. Reopen this PR\n\n${FOOTER}`;
            } else if (reason === 'no_field') {
              message = `@${context.payload.pull_request.user.login}, thank you for your interest in the Canton Development Fund!\n\nYour proposal does not include a Champion/Endorser field.\n\nPer ${CIP_LINK}, all external proposals require a Tech & Ops Committee champion.\n\nNext steps:\n1. Add a "Champion" field to your proposal\n2. Identify a Tech & Ops Committee member organization willing to champion it\n3. Reopen this PR\n\n${FOOTER}`;
            } else {
              message = `@${context.payload.pull_request.user.login}, no proposal file (.md) was found under the proposals/ directory. Please ensure your proposal is placed in proposals/<project-name>.md and reopen this PR.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-champion']
            });

      - name: Confirm valid champion
        if: steps.champion-check.outputs.has_champion == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            const alreadyCommented = comments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Champion identified')
            );
            if (alreadyCommented) return;

            const champion = `${{ steps.champion-check.outputs.champion_value }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Champion identified ${champion}\n\nThe committee will verify this champion during review.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['champion-confirmed']
            });
