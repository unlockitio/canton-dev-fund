name: SIG Label Check

on:
  pull_request_target:
    types: [opened]
    paths:
      - 'proposals/**'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check-sig-label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check and auto-apply SIG labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;

            const SIG_LABELS = [
              'attestor-pools-daos-multisig',
              'canton-apis',
              'canton-protocol-multi-synchronizer',
              'daml-tooling',
              'dapp-integration',
              'dar-app-management',
              'defi-liquidity',
              'defi-protocols',
              'financial-workflows-composability',
              'global-synchronizer-scaling',
              'node-deployment-operations',
              'onchain-governance',
              'party-portability-data-resilience',
              'regulatory-compliance',
              'token-asset-standards',
              'tokenomics',
              'wallet-apps'
            ];

            const prLabels = pr.labels.map(l => l.name);
            const alreadyHasSig = prLabels.some(label => SIG_LABELS.includes(label));
            if (alreadyHasSig) {
              console.log('PR already has a SIG label');
              return;
            }

            let searchText = (pr.body || '').toLowerCase();

            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            const proposalFile = files.data.find(f =>
              f.filename.startsWith('proposals/') && f.filename.endsWith('.md')
            );

            if (proposalFile) {
              try {
                const content = fs.readFileSync(proposalFile.filename, 'utf8');
                searchText += '\n' + content.toLowerCase();
              } catch (e) {
                console.log(`Could not read ${proposalFile.filename}: ${e.message}`);
              }
            }

            const foundLabels = SIG_LABELS.filter(label => searchText.includes(label));

            if (foundLabels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: foundLabels
              });

              const labelList = foundLabels.map(l => `\`${l}\``).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `SIG labels auto-detected and applied: ${labelList}\n\nIf this is incorrect, you can ask the reviewers to update the labels.`
              });

              console.log(`Auto-applied SIG labels: ${foundLabels.join(', ')}`);
            } else {
              const message = `@${pr.user.login}, your proposal is missing a Special Interest Group (SIG) label. Adding the right SIG label ensures the relevant domain experts can find and review your proposal, Check more about [SIGs](https://github.com/canton-foundation/canton-dev-fund/blob/main/sig-directory.md).

            Please add one of the following labels to your PR Description or include the label name in your proposal:

            ${SIG_LABELS.map(l => `- \`${l}\``).join('\n')}

            Not sure which one fits? Pick the closest match to your proposal's domain.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-sig-label']
              });

              console.log('No SIG labels found in PR description or proposal content');
            }
